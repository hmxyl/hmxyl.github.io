>String</span> <span class="variable">output</span> <span class="operator">=</span> <span class="string">&quot;C:/Users/hots_/Downloads/&quot;</span>;</span><br><span class="line">    <span class="type">String</span> <span class="variable">source</span> <span class="operator">=</span> <span class="string">&quot;C:/Users/hots_/Downloads/原图.jpg&quot;</span>; <span class="comment">// 源图片路径</span></span><br><span class="line">    <span class="type">String</span> <span class="variable">icon</span> <span class="operator">=</span> <span class="string">&quot;C:/Users/hots_/Downloads/水印.png&quot;</span>; <span class="comment">// 覆盖图片路径</span></span><br><span class="line">    <span class="type">String</span> <span class="variable">imageName</span> <span class="operator">=</span> <span class="string">&quot;mark_image&quot;</span>; <span class="comment">// 图片名称</span></span><br><span class="line">    <span class="type">String</span> <span class="variable">imageType</span> <span class="operator">=</span> <span class="string">&quot;png&quot;</span>; <span class="comment">// 图片类型jpg,jpeg,png,gif</span></span><br><span class="line">    <span class="type">String</span> <span class="variable">text</span> <span class="operator">=</span> <span class="string">&quot;加水印了&quot;</span>;</span><br><span class="line">    <span class="type">int</span> <span class="variable">size</span> <span class="operator">=</span> <span class="number">4</span>; <span class="comment">// 马赛克大小</span></span><br><span class="line">    <span class="type">Integer</span> <span class="variable">degree</span> <span class="operator">=</span> <span class="literal">null</span>; <span class="comment">// 水印旋转角度-45，null表示不旋转</span></span><br><span class="line">    <span class="type">String</span> <span class="variable">result</span> <span class="operator">=</span> <span class="literal">null</span>;</span><br><span class="line">    <span class="comment">// 给图片添加图片水印</span></span><br><span class="line">    <span class="comment">// result = MarkImageUtils.markImageByMoreIcon(icon, source, output,</span></span><br><span class="line">    <span class="comment">// imageName, imageType, degree);</span></span><br><span class="line">    result =</span><br><span class="line">      MarkImageUtils.markImageBySingleIcon(</span><br><span class="line">        icon,</span><br><span class="line">        source,</span><br><span class="line">        output,</span><br><span class="line">        imageName,</span><br><span class="line">        imageType,</span><br><span class="line">        degree</span><br><span class="line">      );</span><br><span class="line">    <span class="comment">// // 给图片添加文字水印</span></span><br><span class="line">    <span class="comment">// result = MarkImageUtils.markImageByMoreText(source, output,</span></span><br><span class="line">    <span class="comment">// imageName, imageType, Color.red, text, degree);</span></span><br><span class="line">    <span class="comment">// result = MarkImageUtils.markImageBySingleText(source, output,</span></span><br><span class="line">    <span class="comment">// imageName, imageType, Color.red, text, degree);</span></span><br><span class="line">    <span class="comment">// // 给图片打马赛克</span></span><br><span class="line">    <span class="comment">// result = MarkImageUtils.markImageByMosaic(source, output, imageName,</span></span><br><span class="line">    <span class="comment">// imageType, size);</span></span><br><span class="line">    System.out.println(result);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/**</span></span><br><span class="line"><span class="comment">   * 给图片不同位置添加多个图片水印、可设置水印图片旋转角度</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> icon 水印图片路径（如：F:/images/icon.png）</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> source 没有加水印的图片路径（如：F:/images/6.jpg）</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> output 加水印后的图片路径（如：F:/images/）</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> imageName 图片名称（如：11111）</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> imageType 图片类型（如：jpg）</span></span><br><span class="line"><span class="comment">   * <span class="doctag">@param</span> degree 水印图片旋转角度，为null表示不旋转</span></span><br><span class="line"><span class="comment">   */</span></span><br><span class="line">  <span class="keyword">public</span> <span class="keyword">static</span> String <span class="title function_">markImageByMoreIcon</span><span class="params">(</span></span><br><span class="line"><span class="params">    String icon,</span></span><br><span class="line"><span class="params">    String source,</span></span><br><span class="line"><span class="params">    String output,</span></span><br><span class="line"><span class="params">    String imageName,</span></span><br><span class="line"><span class="params">    String imageType,</span></span><br><span class="line"><span class="params">    Integer degree</span></span><br><span class="line"><span class="params">  )</span> &#123;</span><br><span class="line">    <span class="type">String</span> <span class="variable">result</span> <span class="operator">=</span> <span class="string">&quot;添加图片水印出错&quot;</span>;</span><br><span class="line">    <span class="keyword">try</span> &#123;</span><br><span class="line">      <span class="type">File</span> <span class="variable">file</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">File</span>(source);</span><br><span class="line">      <span class="type">File</span> <span class="variable">ficon</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">File</span>(icon);</span><br><span class="line">      <span class="keyword">if</span> (!file.isFile()) &#123;</span><br><span class="line">        <span class="keyword">return</span> source + <span class="string">&quot; 不是一个图片文件!&quot;</span>;</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="comment">// 将icon加载到内存中</span></span><br><span class="line">      <span class="type">Image</span> <span class="variable">ic</span> <span class="operator">=</span> ImageIO.read(ficon);</span><br><span class="line">      <span class="comment">// icon高度</span></span><br><span class="line">      <span class="type">int</span> <span class="variable">icheight</span> <span class="operator">=</span> ic.getHeight(<span class="literal">null</span>);</span><br><span class="line">      <span class="comment">// 将源图片读到内存中</span></span><br><span class="line">      <span class="type">Image</span> <span class="variable">img</span> <span class="operator">=</span> ImageIO.read(file);</span><br><span class="line">      <span class="comment">// 图片宽</span></span><br><span class="line">      <span class="type">int</span> <span class="variable">width</span> <span class="operator">=</span> img.getWidth(<span class="literal">null</span>);</span><br><span class="line">      <span class="comment">// 图片高</span></span><br><span class="line">      <span class="type">int</span> <span class="variable">height</span> <span class="operator">=</span> img.getHeight(<span class="literal">null</span>);</span><br><span class="line">      <span class="type">BufferedImage</span> <span class="variable">bi</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">BufferedImage</span>(</span><br><span class="line">        width,</span><br><span class="line">        height,</span><br><span class="line">        BufferedImage.TYPE_INT_RGB</span><br><span class="line">      );</span><br><span class="line">      <span class="comment">// 创建一个指定 BufferedImage 的 Graphics2D 对象</span></span><br><span class="line">      <span class="type">Graphics2D</span> <span class="variable">g</span> <span class="operator">=</span> bi.createGraphics();</span><br><span class="line">      <span class="comment">// x,y轴默认是从0坐标开始</span></span><br><span class="line">      <span class="type">int</span> <span class="variable">x</span> <span class="operator">=</span> <span class="number">0</span>;</span><br><span class="line">      <span class="type">int</span> <span class="variable">y</span> <span class="operator">=</span> <span class="number">0</span>;</span><br><span class="line">      <span class="comment">// 默认两张水印图片的间隔高度是水印图片的1/3</span></span><br><span class="line">      <span class="type">int</span> <span class="variable">temp</span> <span class="operator">=</span> icheight / <span class="number">3</span>;</span><br><span class="line">      <span class="type">int</span> <span class="variable">space</span> <span class="operator">=</span> <span class="number">1</span>;</span><br><span class="line">      <span class="keyword">if</span> (height &gt;= icheight) &#123;</span><br><span class="line">        space = height / icheight;</span><br><span class="line">        <span class="keyword">if</span> (space &gt;= <span class="number">2</span>) &#123;</span><br><span class="line">          temp = y = icheight / <span class="number">2</span>;</span><br><span class="line">          <span class="keyword">if</span> (space == <span class="number">1</span> || space == <span class="number">0</span>) &#123;</span><br><span class="line">            x = <span class="number">0</span>;</span><br><span class="line">            y = <span class="number">0</span>;</span><br><span class="line">          &#125;</span><br><span class="line">        &#125;</span><br><span class="line">      &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">        x = <span class="number">0</span>;</span><br><span class="line">        y = <span class="number">0</span>;</span><br><span class="l
